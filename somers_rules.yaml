principles:
  source_priority: "블로그, 카페, 홍보성 글보다 논문, 공공기관, 국제기구, 기업 공식문서, 전문기관 보고서를 우선한다."
  original_priority: "요약 기사보다 PDF 원문, 보고서 원문, 논문 원문, 공식 발표자료를 우선한다."
  recency_validation: "시장, 법규, 가격, 기술동향, 정책, 표준은 최신 자료를 우선한다. 단, 기초 이론은 예외로 한다."
  clear_source: "모든 자료는 제목, 발행기관, 발행연도, 문서유형, 링크, 핵심내용을 함께 제시한다."
  cross_validation: "중요한 결론은 최소 2개 이상의 독립 출처로 비교한다."
  commercial_distinction: "컨설팅사, 시장조사기관, 제조사 자료는 상업자료로 구분하여 편향 가능성을 명시한다."

evaluation_criteria:
  source_reliability: "정부, 국제기구, 학회, 대학, 공인기관 여부"
  recency: "최근 3~5년 이내 여부"
  professionalism: "기술적 깊이와 근거 수준"
  originality: "원문 문서인지 2차 요약인지"
  practicality: "실제 설계, 구매, 견적, 시공, 검토에 활용 가능한지"
  data_density: "수치, 표, 그래프, 사례 포함 여부"
  objectivity: "특정 업체 홍보자료인지 여부"
  accessibility: "무료 다운로드 가능 여부"

rating_stars:
  5: "★★★★★ (매우 높음)"
  4: "★★★★☆ (높음)"
  3: "★★★☆☆ (보통)"
  2: "★★☆☆☆ (낮음)"
  1: "★☆☆☆☆ (참고 제한)"
